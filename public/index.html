<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkTrack</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5EF;--bg2:#EFEDE6;--bg3:#E5E3DB;
  --card:#FFFFFF;--border:#E0DDD4;--border2:#CECAC0;
  --text:#1C1B18;--text2:#6B6860;--text3:#9A9890;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-b:#FAC775;--amber-d:#854F0B;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#0F6E56;
  --red:#D94040;--red-l:#FDEAEA;--red-d:#9B2020;
  --blue:#2B7FD4;--blue-l:#E6F1FB;--blue-d:#1A5499;
  --green:#4E8F18;--green-l:#EAF3DE;--green-d:#336010;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{min-height:100vh}

/* ===== LOADING ===== */
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== LOGIN ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.brand-icon{width:44px;height:44px;background:var(--amber);border-radius:12px;display:grid;place-items:center;color:#fff;font-size:22px}
.brand-name{font-size:22px;font-weight:700;line-height:1}
.brand-sub{font-size:12px;color:var(--text2);margin-top:3px}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.75rem;padding:5px;background:var(--bg2);border-radius:12px}
.role-tab{padding:10px;border:none;border-radius:9px;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.role-tab.active{background:var(--card);color:var(--amber-d);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--amber-b);background:var(--card)}
.btn-login{width:100%;padding:13px;background:var(--amber);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn-login:hover{opacity:.9}

/* ===== LAYOUT ===== */
.layout{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.sb-brand{padding:1.25rem 1.1rem;border-bottom:1px solid var(--border)}
.sb-name{font-size:15px;font-weight:700}
.sb-role{font-size:11.5px;color:var(--text2);margin-top:2px}
.sb-wage{font-size:11.5px;color:var(--amber-d);font-weight:600;margin-top:2px}

/* ===== MOBILE HAMBURGER MENU ===== */
.mobile-menu-btn{
  display:none;position:fixed;top:12px;right:12px;z-index:400;
  width:42px;height:42px;border-radius:11px;
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);cursor:pointer;
  align-items:center;justify-content:center;
  font-size:20px;color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
.mobile-menu-dropdown{
  display:none;position:fixed;top:60px;right:12px;z-index:400;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);
  min-width:220px;padding:8px;
  max-height:80vh;overflow-y:auto;
}
.mobile-menu-dropdown.open{display:block}
.dd-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:9px;cursor:pointer;
  font-size:14px;font-weight:500;color:var(--text);
  border:none;background:none;width:100%;text-align:left;
  -webkit-tap-highlight-color:transparent;position:relative;
}
.dd-item:hover{background:var(--bg2)}
.dd-item.active{background:var(--amber-l);color:var(--amber-d);font-weight:600}
.dd-item i{font-size:19px;color:var(--text2);width:24px;text-align:center;flex-shrink:0}
.dd-item.active i{color:var(--amber)}
.dd-sep{height:1px;background:var(--border);margin:6px 0}
.dd-logout{color:var(--red-d)!important}
.dd-logout i{color:var(--red)!important}
.dd-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center}
.mobile-menu-overlay{display:none;position:fixed;inset:0;z-index:399}
.mobile-menu-overlay.open{display:block}
.nav{flex:1;padding:.5rem 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 1.1rem;font-size:13.5px;cursor:pointer;color:var(--text2);border-left:3px solid transparent;transition:all .12s;position:relative}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--amber-l);color:var(--amber-d);border-left-color:var(--amber);font-weight:600}
.nav-item i{font-size:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center}
.sb-bottom{padding:1rem;border-top:1px solid var(--border)}
.logout-btn{width:100%;padding:9px;background:none;border:1px solid var(--border);border-radius:9px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center;transition:all .15s}
.logout-btn:hover{background:var(--red-l);color:var(--red-d);border-color:var(--red)}
.main{flex:1;overflow-y:auto;min-height:100vh}
.page{padding:1.75rem;max-width:1020px}
.page-hd{margin-bottom:1.75rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.page-title{font-size:24px;font-weight:700}
.page-sub{font-size:13.5px;color:var(--text2);margin-top:5px}

/* ===== CARDS ===== */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:12px;padding:1rem;border:1px solid var(--border)}
.stat-label{font-size:11.5px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-amber{color:var(--amber)}.c-blue{color:var(--blue)}.c-teal{color:var(--teal)}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge-present{background:var(--teal-l);color:var(--teal-d)}
.badge-absent{background:var(--red-l);color:var(--red-d)}
.badge-pending{background:var(--amber-l);color:var(--amber-d)}
.badge-approved{background:var(--green-l);color:var(--green-d)}
.badge-rejected{background:var(--red-l);color:var(--red-d)}
.badge-unmarked{background:var(--bg3);color:var(--text2)}
.badge-leave{background:var(--blue-l);color:var(--blue-d)}
.badge-active{background:var(--teal-l);color:var(--teal-d)}
.badge-on-hold{background:var(--amber-l);color:var(--amber-d)}
.badge-construction{background:#FEF3E8;color:#9A4200}
.badge-road{background:var(--red-l);color:var(--red-d)}
.badge-renovation{background:var(--blue-l);color:var(--blue-d)}
.badge-maintenance{background:var(--green-l);color:var(--green-d)}

/* ===== ALERTS ===== */
.alert{padding:12px 16px;border-radius:10px;font-size:13.5px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;border:1px solid transparent}
.alert-success{background:var(--teal-l);color:var(--teal-d);border-color:#9FE1CB}
.alert-warning{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber-b)}
.alert-info{background:var(--blue-l);color:var(--blue-d);border-color:#B5D4F4}
.alert-error{background:var(--red-l);color:var(--red-d);border-color:#F5B3B3}

/* ===== TABLES ===== */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{padding:10px 14px;text-align:left;font-size:11.5px;font-weight:700;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--amber-l);color:var(--amber-d);display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0}
.flex-c{display:flex;align-items:center;gap:9px}
td.mono{font-family:monospace;font-size:13px}

/* ===== FORMS ===== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr}
.form-field{margin-bottom:.9rem}
.form-field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:9px;font-size:13.5px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--amber-b);background:var(--card)}
.form-field textarea{resize:vertical;min-height:80px}
.form-field input:disabled,.form-field select:disabled,.form-field textarea:disabled{opacity:.5;cursor:not-allowed}

/* ===== BUTTONS ===== */
.btn{padding:9px 18px;border:none;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-amber{background:var(--amber);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:6px 13px;font-size:12.5px;border-radius:7px}
.btn-xl{padding:13px 26px;font-size:15px;border-radius:11px}

/* ===== ATTENDANCE CLOCK ===== */
.att-clock{text-align:center;padding:2rem 1rem;border-radius:12px;background:var(--bg2);border:1px solid var(--border);margin-bottom:1.25rem}
.clock-time{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1}
.clock-date{font-size:14px;color:var(--text2);margin-top:6px;margin-bottom:1.5rem}
.att-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.att-status-done{display:flex;flex-direction:column;align-items:center;gap:8px}

/* ===== PROJECT CARDS ===== */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.proj-card{border:1.5px solid var(--border);border-radius:13px;padding:1.1rem;cursor:pointer;transition:all .15s;background:var(--card);position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border)}
.proj-card.type-construction::before{background:#D46B0A}
.proj-card.type-road::before{background:var(--red)}
.proj-card.type-renovation::before{background:var(--blue)}
.proj-card.type-maintenance::before{background:var(--green)}
.proj-card:hover:not(.disabled){border-color:var(--amber);transform:translateY(-1px);box-shadow:var(--shadow)}
.proj-card.selected{border-color:var(--amber);border-width:2px;background:var(--amber-l)}
.proj-card.selected::after{content:'✓ Selected';position:absolute;top:10px;right:10px;background:var(--amber);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
.proj-card.disabled{opacity:.55;cursor:not-allowed}
.proj-name{font-size:14.5px;font-weight:700;margin:8px 0 4px}
.proj-loc{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;margin-bottom:8px}
.proj-meta{font-size:12px;color:var(--text3);margin-top:2px}

/* ===== CALENDAR ===== */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-head{text-align:center;font-size:10.5px;color:var(--text3);padding:4px;font-weight:600}
.cal-cell{text-align:center;padding:6px 2px;border-radius:6px;font-size:12px;font-weight:500;cursor:default}
.cal-present{background:var(--teal-l);color:var(--teal-d)}
.cal-absent{background:var(--red-l);color:var(--red-d)}
.cal-leave{background:var(--blue-l);color:var(--blue-d)}
.cal-weekend{background:var(--bg2);color:var(--text3)}
.cal-today{outline:2px solid var(--amber);outline-offset:-1px}
.cal-empty{background:transparent}

/* ===== REPORT ===== */
.report-header{background:linear-gradient(135deg,var(--amber-d),var(--amber));color:#fff;border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
.report-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:1.25rem}
.rs{background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--border)}
.rs-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.rs-val{font-size:20px;font-weight:700}
.worker-block{border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.wb-header{padding:13px 16px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px}
.wb-header:hover{background:var(--bg3)}
.wb-body{padding:16px;border-top:1px solid var(--border)}
.wb-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;font-size:13px;margin-bottom:1rem}
.wb-stat{background:var(--bg);border-radius:8px;padding:10px}
.wb-stat-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.wb-stat-val{font-size:15px;font-weight:700}

/* ===== MISC ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text2)}
.empty-state i{font-size:40px;margin-bottom:10px;display:block;color:var(--text3)}
.empty-state p{font-size:14px}
.section-sep{height:1px;background:var(--border);margin:1.25rem 0}
.cutoff-note{font-size:12.5px;color:var(--red);display:flex;align-items:center;gap:6px;margin-top:10px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11.5px;font-weight:600}
.pill-deduct{background:var(--red-l);color:var(--red-d);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.pill-earn{background:var(--green-l);color:var(--green-d);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.info-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px}
.info-row strong{color:var(--text)}

@media(max-width:700px){
  .form-grid{grid-template-columns:1fr}
  .form-grid.col3{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .page{padding:1rem;padding-top:1rem;padding-bottom:1.5rem}
  .page-hd{margin-bottom:1.25rem}
  .page-title{font-size:20px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .card{padding:1rem;border-radius:12px}

  /* Hide desktop sidebar entirely on mobile */
  .sidebar{display:none}

  /* Bottom nav bar */
  .mobile-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    background:var(--card);
    border-top:1px solid var(--border);
    z-index:200;
    padding:0;
    padding-bottom:env(safe-area-inset-bottom);
    box-shadow:0 -2px 12px rgba(0,0,0,.08);
  }
  .mobile-nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:10px 4px 8px;
    font-size:10px;font-weight:500;color:var(--text3);
    cursor:pointer;border:none;background:none;
    gap:4px;min-width:0;position:relative;
    transition:color .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .mobile-nav-item i{font-size:22px;line-height:1}
  .mobile-nav-item.active{color:var(--amber-d)}
  .mobile-nav-item.active i{color:var(--amber)}
  .mobile-nav-item .nav-badge{
    position:absolute;top:6px;right:calc(50% - 18px);
    min-width:16px;height:16px;font-size:9px;padding:0 4px;
    display:flex;align-items:center;justify-content:center;
  }
  .mobile-nav-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}

  /* "More" drawer overlay */
  .mobile-more-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;
  }
  .mobile-more-overlay.open{display:block}
  .mobile-more-sheet{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--card);border-radius:20px 20px 0 0;
    padding:1.25rem 1rem;
    padding-bottom:calc(1rem + env(safe-area-inset-bottom));
    z-index:301;
  }
  .mobile-more-sheet .more-item{
    display:flex;align-items:center;gap:14px;
    padding:13px 8px;border-radius:10px;cursor:pointer;
    font-size:15px;font-weight:500;color:var(--text);
    border:none;background:none;width:100%;text-align:left;
    -webkit-tap-highlight-color:transparent;
  }
  .mobile-more-sheet .more-item:hover{background:var(--bg2)}
  .mobile-more-sheet .more-item i{font-size:22px;color:var(--text2);width:28px;text-align:center}
  .mobile-more-sheet .more-item.active{color:var(--amber-d)}
  .mobile-more-sheet .more-item.active i{color:var(--amber)}
  .mobile-more-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 1.1rem}

  /* Logout in more drawer */
  .mobile-logout{
    margin-top:.5rem;padding-top:.75rem;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:14px;
    padding:13px 8px;border-radius:10px;cursor:pointer;
    font-size:15px;font-weight:500;color:var(--red-d);
    border:none;background:none;width:100%;text-align:left;
    -webkit-tap-highlight-color:transparent;
  }

  /* Table scroll hint */
  .table-wrap{-webkit-overflow-scrolling:touch}

  /* Bigger tap targets for buttons */
  .btn-sm{padding:9px 14px;font-size:13px}
  td{padding:10px 10px}
  th{padding:8px 10px}

  /* Attendance clock bigger on mobile */
  .clock-time{font-size:48px}
  .att-actions .btn-xl{flex:1;justify-content:center}

  /* proj grid single col */
  .proj-grid{grid-template-columns:1fr}

  /* wb-header stacks on mobile */
  .wb-header{flex-direction:column;align-items:flex-start;gap:8px}
}

/* Show mobile-nav only on small screens */
.mobile-nav{display:none}
@media(max-width:700px){.mobile-nav{display:flex}}
@media(max-width:700px){.mobile-menu-btn{display:flex}}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="spinner"></div><span style="color:var(--text2);font-size:14px">Starting WorkTrack…</span></div></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const API = '';  // same origin

// ── STATE ────────────────────────────────────────────────────────────────────
const S = {
  user: null,
  page: 'login',
  loginRole: 'worker',
  alert: null,
  alertTimer: null,
  cache: {},
  expandedWorker: null,
  reportMonth: new Date().getMonth() + 1,
  reportYear: new Date().getFullYear(),
  reportTab: 'worker',
};

// ── API HELPERS ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json().catch(() => null);
}
const GET = path => api('GET', path);
const POST = (path, b) => api('POST', path, b);
const PATCH = (path, b) => api('PATCH', path, b);

// ── HELPERS ──────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function nowTime() { return new Date().toTimeString().slice(0,5); }
function after11() { return new Date().getHours() >= 11; }
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function initials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }
function monthName(m) { return ['January','February','March','April','May','June','July','August','September','October','November','December'][m-1]; }

function showAlert(msg, type='success') {
  S.alert = { msg, type };
  if (S.alertTimer) clearTimeout(S.alertTimer);
  S.alertTimer = setTimeout(() => { S.alert = null; renderAlert(); }, 3500);
  renderAlert();
}
function renderAlert() {
  const el = document.getElementById('alert-zone');
  if (!el) return;
  el.innerHTML = S.alert
    ? `<div class="alert alert-${S.alert.type}"><i class="ti ${S.alert.type==='success'?'ti-circle-check':S.alert.type==='error'?'ti-circle-x':'ti-info-circle'}"></i>${S.alert.msg}</div>`
    : '';
}
function alertHTML() {
  return S.alert
    ? `<div id="alert-zone"><div class="alert alert-${S.alert.type}"><i class="ti ${S.alert.type==='success'?'ti-circle-check':S.alert.type==='error'?'ti-circle-x':'ti-info-circle'}"></i>${S.alert.msg}</div></div>`
    : '<div id="alert-zone"></div>';
}

async function doLogin() {

  if (!name || !pin) { showAlert('Please enter name and PIN.', 'warning'); return; }

function attachNav() {
  // Desktop sidebar nav items
  document.querySelectorAll('.nav-item[data-page]').forEach(el =>
    el.addEventListener('click', () => showPage(el.dataset.page))
  );
  // Desktop logout
  document.getElementById('logout-btn')?.addEventListener('click', () => { S.user=null; S.page='login'; showLogin(); });

  // Mobile hamburger menu
  const menuBtn = document.getElementById('mobile-menu-btn');
  const menuOverlay = document.getElementById('mobile-menu-overlay');
  const menuDropdown = document.getElementById('mobile-menu-dropdown');
  if (menuBtn && menuDropdown) {
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menuDropdown.classList.contains('open');
      menuDropdown.classList.toggle('open', !isOpen);
      menuOverlay.classList.toggle('open', !isOpen);
    });
    menuOverlay?.addEventListener('click', () => {
      menuDropdown.classList.remove('open');
      menuOverlay.classList.remove('open');
    });
    menuDropdown.querySelectorAll('.dd-item[data-page]').forEach(el =>
      el.addEventListener('click', () => {
        menuDropdown.classList.remove('open');
        menuOverlay.classList.remove('open');
        showPage(el.dataset.page);
      })
    );
    document.getElementById('dd-logout-btn')?.addEventListener('click', () => { S.user=null; S.page='login'; showLogin(); });
  }
}

// ── PAGE ROUTER ───────────────────────────────────────────────────────────────
async function showPage(page) {
  S.page = page;
  loading();
  try {
    if (page === 'worker-dashboard') await renderWorkerDashboard();
    else if (page === 'worker-projects')   await renderWorkerProjects();
    else if (page === 'worker-attendance') await renderWorkerAttendance();
    else if (page === 'worker-leaves')     await renderWorkerLeaves();
    else if (page === 'worker-advance')    await renderWorkerAdvance();
    else if (page === 'worker-bills')      await renderWorkerBills();
    else if (page === 'worker-history')    await renderWorkerHistory();
    else if (page === 'worker-profile')    await renderWorkerProfile();
    else if (page === 'mgr-dashboard')     await renderMgrDashboard();
    else if (page === 'mgr-attendance')    await renderMgrAttendance();
    else if (page === 'mgr-leaves')        await renderMgrLeaves();
    else if (page === 'mgr-advances')      await renderMgrAdvances();
    else if (page === 'mgr-bills')         await renderMgrBills();
    else if (page === 'mgr-report')        await renderMgrReport();
    else if (page === 'mgr-workers')       await renderMgrWorkers();
    else if (page === 'mgr-projects')      await renderMgrProjects();
    else if (page === 'mgr-user-mgmt')    await renderMgrUserManagement();
  } catch(e) {
    render(workerLayout(`<div class="alert alert-error"><i class="ti ti-circle-x"></i>Error loading page: ${e.message}</div>`));
    attachNav();
  }
}

async function renderWorkerDashboard() {
  const wid = S.user.id;

    GET(`/api/attendance?worker_id=${wid}`),
    GET(`/api/leaves?worker_id=${wid}`),
    GET(`/api/advances?worker_id=${wid}`),
    GET(`/api/worker-project/${wid}`),
  ]);
  const todayAtt = att.find(a => a.date === today());
  const present = att.filter(a=>a.status==='present').length;
  const absent  = att.filter(a=>a.status==='absent').length;
  const approvedLeaves = leaves.filter(l=>l.status==='approved');
  const leaveDays = approvedLeaves.reduce((s,l)=>{
    const d = Math.ceil((new Date(l.to_date)-new Date(l.from_date))/86400000)+1;
    return s+d;
  },0);
  // Monthly salary: salary - (salary/30 * absent_days)
  const monthlySalary = S.user.wage || 0;
  const deductPerDay = monthlySalary / 30;
  const earned = Math.round(monthlySalary - (deductPerDay * absent));
  const pending = leaves.filter(l=>l.status==='pending').length + advances.filter(a=>a.status==='pending').length;

      <div class="stat"><div class="stat-label">Advance Taken</div><div class="stat-val c-blue">₹${approvedAdv.toLocaleString('en-IN')}</div></div>
      <div class="stat"><div class="stat-label">Pending Requests</div><div class="stat-val">${pending}</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Today's Attendance</div>
        ${todayAtt
          ? `<div class="alert alert-${todayAtt.status==='present'?'success':'warning'}">
               <i class="ti ${todayAtt.status==='present'?'ti-circle-check':'ti-circle-x'}"></i>
               <strong>${todayAtt.status==='present'?'Present':'Absent'}</strong> — marked at ${todayAtt.time}
               <span style="margin-left:auto;font-size:12px">${todayAtt.confirmed?'✓ Confirmed':'Pending'}</span>
             </div>

            `
          : `<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i>Not marked today. <a href="#" id="goto-att" style="color:var(--amber-d);font-weight:600">Mark now →</a></div>`}
      </div>
      <div class="card">
        <div class="card-title">Current Project</div>
        ${proj
          ? `<div class="proj-name" style="font-size:14px">${proj.name}</div>
             <div class="proj-loc"><i class="ti ti-map-pin" style="font-size:13px"></i>${proj.location}</div>
             <span class="badge badge-${proj.status}">${proj.status}</span>`
          : `<div style="font-size:13.5px;color:var(--text2)">No project selected. <a href="#" id="goto-proj" style="color:var(--amber-d);font-weight:600">Select one →</a></div>`}
      </div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Recent Leave Requests</div>
        ${leaves.length===0
          ? `<div class="empty-state"><i class="ti ti-calendar-off"></i><p>No leave requests yet</p></div>`
          : leaves.slice(0,3).map(l=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">

async function getBadges() {
  const [leaves, advances, att, bills] = await Promise.all([
    GET('/api/leaves?status=pending'),
    GET('/api/advances?status=pending'),
    GET(`/api/attendance?date=${today()}`),
    GET('/api/bills?status=pending'),
  ]);
  const workers = await GET('/api/workers');
  const unconfirmed = att.filter(a => !a.confirmed).length;
  return { att: unconfirmed, leaves: leaves.length, adv: advances.length, bills: bills.length };
}

async function renderMgrAttendance() {
  const [workers, att, badges] = await Promise.all([
    GET('/api/workers'),
    GET(`/api/attendance?date=${today()}`),
    getBadges(),
  ]);
  const workerProjects = await Promise.all(workers.map(w => GET(`/api/worker-project/${w.id}`).catch(()=>null)));
  const unmarkedCount = workers.filter(w => !att.find(a=>a.worker_id===w.id)).length;

  render(mgrLayout(`
    <div class="page-hd">
      <div><div class="page-title">Confirm Attendance</div><div class="page-sub">Review and confirm workers' check-ins for today — ${fmtDate(today())}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${unmarkedCount > 0 ? `
          <button class="btn btn-teal btn-sm" id="bulk-present"><i class="ti ti-checks"></i> Mark All Unmarked Present</button>
          <button class="btn btn-red btn-sm" id="bulk-absent"><i class="ti ti-circle-x"></i> Mark All Unmarked Absent</button>
        ` : ''}
      </div>
    </div>
    ${att.filter(a=>!a.confirmed).length===0&&unmarkedCount===0?`<div class="alert alert-success"><i class="ti ti-circle-check"></i>All attendance confirmed for today.</div>`:''}
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Worker</th><th>Project</th><th>Status</th><th>Marked At</th><th>Phone</th><th>Action</th></tr></thead>
        <tbody>
          ${workers.map((w,i) => {
            const a = att.find(a=>a.worker_id===w.id);
            const proj = workerProjects[i];
            return `<tr>
              <td><div class="flex-c"><div class="avatar">${initials(w.name)}</div>${w.name}</div></td>
              <td style="font-size:12.5px">${proj?.name||'—'}</td>
              <td>${a?`<span class="badge badge-${a.status}">${a.status}</span>`:`<span class="badge badge-unmarked">Unmarked</span>`}</td>
              <td class="mono" style="font-size:12.5px">${a?.time||'—'}</td>
              <td style="font-size:12.5px">${w.phone}</td>
              <td style="white-space:nowrap">
                ${a
                  ? a.confirmed
                    ? `<span style="color:var(--teal-d);font-size:12px;font-weight:600">✓ Confirmed</span>
                       <button class="btn btn-ghost btn-sm" style="margin-left:6px" data-correct="${w.id}" data-current="${a.status}"><i class="ti ti-pencil"></i> Correct</button>`
                    : `<button class="btn btn-green btn-sm" data-confirm="${w.id}"><i class="ti ti-check"></i> Confirm</button>
                       <button class="btn btn-ghost btn-sm" style="margin-left:6px" data-correct="${w.id}" data-current="${a.status}"><i class="ti ti-pencil"></i> Correct</button>`
                  : `<button class="btn btn-red btn-sm" data-absent="${w.id}"><i class="ti ti-circle-x"></i> Mark Absent</button>`}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>

    <!-- Correction modal -->
    <div id="correct-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center">
      <div style="background:var(--card);border-radius:16px;padding:1.75rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.18);margin:1rem">
        <div style="font-size:17px;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between">
          Correct Attendance <button id="correct-close" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2)">×</button>
        </div>
        <div style="font-size:13.5px;color:var(--text2);margin-bottom:1.25rem">Change the marked status for <strong id="correct-name"></strong> on <strong>${fmtDate(today())}</strong></div>
        <input type="hidden" id="correct-uid">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button class="btn btn-teal" id="correct-present" style="justify-content:center"><i class="ti ti-circle-check"></i> Set Present</button>
          <button class="btn btn-red"  id="correct-absent"  style="justify-content:center"><i class="ti ti-circle-x"></i> Set Absent</button>
        </div>
      </div>
    </div>
  `, badges));
  attachNav();

  // Confirm
  document.querySelectorAll('[data-confirm]').forEach(b => b.onclick = async () => {
    await PATCH('/api/attendance/confirm', { worker_id:b.dataset.confirm, date:today(), confirmed_by:S.user.id });
    showAlert('Attendance confirmed!'); showPage('mgr-attendance');
  });
  // Mark absent
  document.querySelectorAll('[data-absent]').forEach(b => b.onclick = async () => {
    await POST('/api/attendance/manager-absent', { worker_id:b.dataset.absent, date:today(), marked_by:S.user.id });
    showAlert('Worker marked absent.','warning'); showPage('mgr-attendance');
  });
  // Bulk present / absent
  document.getElementById('bulk-present')?.addEventListener('click', async () => {
    if (!confirm(`Mark all ${unmarkedCount} unmarked workers as PRESENT?`)) return;
    await POST('/api/attendance/bulk', { status:'present', marked_by:S.user.id, date:today() });
    showAlert(`${unmarkedCount} workers marked present.`); showPage('mgr-attendance');
  });
  document.getElementById('bulk-absent')?.addEventListener('click', async () => {
    if (!confirm(`Mark all ${unmarkedCount} unmarked workers as ABSENT?`)) return;
    await POST('/api/attendance/bulk', { status:'absent', marked_by:S.user.id, date:today() });
    showAlert(`${unmarkedCount} workers marked absent.`,'warning'); showPage('mgr-attendance');
  });
  // Correction modal
  const modal = document.getElementById('correct-modal');
  document.querySelectorAll('[data-correct]').forEach(b => {
    b.onclick = () => {
      document.getElementById('correct-uid').value = b.dataset.correct;
      document.getElementById('correct-name').textContent = workers.find(w=>w.id===b.dataset.correct)?.name || '';
      modal.style.display = 'flex';
    };
  });
  document.getElementById('correct-close').onclick = () => { modal.style.display='none'; };
  modal.onclick = e => { if(e.target===modal) modal.style.display='none'; };
  async function doCorrect(status) {
    const wid = document.getElementById('correct-uid').value;
    try {
      await PATCH('/api/attendance/correct', { worker_id:wid, date:today(), status, corrected_by:S.user.id });
      modal.style.display='none';
      showAlert(`Attendance corrected to "${status}".`);
      showPage('mgr-attendance');
    } catch(e) { showAlert(e.message,'error'); }
  }
  document.getElementById('correct-present').onclick = () => doCorrect('present');
  document.getElementById('correct-absent').onclick  = () => doCorrect('absent');
}

async function renderMgrReport() {
  const badges = await getBadges();
  const data = await GET(`/api/report?month=${S.reportMonth}&year=${S.reportYear}`);
  const { workers, attendance, leaves, advances, workerProjects } = data;
  // Get all projects for project-wise report
  const projects = await GET('/api/projects');

  if (!S.reportTab) S.reportTab = 'worker';

  function workerCalc(w) {
    const days = daysInMonth(S.reportYear, S.reportMonth);
    const wAtt = attendance.filter(a=>a.worker_id===w.id);
    const wLeaves = leaves.filter(l=>l.worker_id===w.id);
    const wAdv = advances.filter(a=>a.worker_id===w.id);
    const proj = workerProjects.find(wp=>wp.worker_id===w.id);

    let present=0, absent=0, leaveDays=0;
    const log = [];
    // Track which projects this worker worked on this month
    const projectsWorkedOn = {};
    for (let d=1; d<=days; d++) {
      const dateStr = `${S.reportYear}-${String(S.reportMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = new Date(dateStr+'T00:00:00').getDay();
      const isWeekend = dow===0||dow===6;
      const a = wAtt.find(a=>a.date===dateStr);
      const onLeave = wLeaves.some(l=>dateStr>=l.from_date&&dateStr<=l.to_date);
      let status = '—';
      if (a) {
        status=a.status;
        if(a.status==='present') { present++; if(a.project_name) projectsWorkedOn[a.project_name]=true; }
        else if(a.status==='absent') absent++;
      }
      else if (onLeave && !isWeekend) { status='leave'; leaveDays++; }
      log.push({ day:d, dow, isWeekend, status, proj:a?.project_name||'' });
    }
    // Monthly salary deduction formula: salary - (salary/30 * absent_days)
    const monthlySalary = Number(w.wage) || 0;
    const gross = Math.round(monthlySalary - (monthlySalary / 30 * absent));
    const advDeductions = wAdv.filter(a=>a.status==='approved').reduce((s,a)=>s+Number(a.amount),0);
    const net = Math.max(0, gross - advDeductions);
    const projectsList = Object.keys(projectsWorkedOn);
    return { w, present, absent, leaveDays, gross, monthlySalary, deductions: advDeductions, net, log, proj, projectsList, wAdv };
  }

  const reports = workers.map(workerCalc);
  const totalGross = reports.reduce((s,r)=>s+r.gross,0);
  const totalNet   = reports.reduce((s,r)=>s+r.net,0);
  const totalDed   = reports.reduce((s,r)=>s+r.deductions,0);
  const firstDow   = new Date(S.reportYear, S.reportMonth-1, 1).getDay();

  // Project-wise aggregation
  function projectCalc(proj) {
    // Workers assigned to this project (from worker_projects) or who worked on it this month
    const workerIdsOnProj = new Set();
    workerProjects.forEach(wp => { if(wp.project_id === proj.id || wp.name === proj.name) workerIdsOnProj.add(wp.worker_id); });
    // Also include workers who have attendance records for this project this month
    attendance.forEach(a => { if(a.project_name === proj.name) workerIdsOnProj.add(a.worker_id); });
    const projWorkerReports = reports.filter(r => workerIdsOnProj.has(r.w.id));
    const totalDaysWorked = projWorkerReports.reduce((s,r)=>s+r.present,0);
    const totalAdvances = advances.filter(a => workerIdsOnProj.has(a.worker_id) && a.status==='approved').reduce((s,a)=>s+Number(a.amount),0);
    const totalSalary = projWorkerReports.reduce((s,r)=>s+r.gross,0);
    return { proj, projWorkerReports, totalDaysWorked, totalAdvances, totalSalary };
  }
  const projectReports = projects.map(projectCalc).filter(pr => pr.projWorkerReports.length > 0);

  render(mgrLayout(`
    <div class="page-hd">
      <div><div class="page-title">Reports</div><div class="page-sub">Monthly payroll & project summary</div></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <select id="rep-month" style="padding:9px 13px;border:1px solid var(--border);border-radius:9px;background:var(--bg);font-size:13.5px;color:var(--text)">
          ${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${i+1===S.reportMonth?'selected':''}>${monthName(i+1)}</option>`).join('')}
        </select>
        <select id="rep-year" style="padding:9px 13px;border:1px solid var(--border);border-radius:9px;background:var(--bg);font-size:13.5px;color:var(--text)">
          ${[2024,2025,2026,2027].map(y=>`<option value="${y}" ${y===S.reportYear?'selected':''}>${y}</option>`).join('')}
        </select>
        <button class="btn btn-blue" id="dl-report"><i class="ti ti-download"></i> Download</button>
      </div>
    </div>
    <div class="report-summary">
      <div class="rs"><div class="rs-label">Gross Payroll</div><div class="rs-val c-amber">₹${totalGross.toLocaleString('en-IN')}</div></div>
      <div class="rs"><div class="rs-label">Advance Deductions</div><div class="rs-val c-red">₹${totalDed.toLocaleString('en-IN')}</div></div>
      <div class="rs"><div class="rs-label">Net Payable</div><div class="rs-val c-green">₹${totalNet.toLocaleString('en-IN')}</div></div>

        <div class="stb"><div class="stl">Salary (after absence)</div><div class="stv">₹${r.gross.toLocaleString('en-IN')}</div></div>
        <div class="stb" style="background:#eaf3de"><div class="stl">Net Payable</div><div class="stv" style="color:#2d7a2d">₹${r.net.toLocaleString('en-IN')}</div></div>
      </div>
      <div class="cal">
        ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="ch">${d}</div>`).join('')}
        ${Array(firstDow).fill('<div class="ce"></div>').join('')}
        ${r.log.map(d=>{
          let c='';
          if(d.isWeekend)c='cw'; else if(d.status==='present')c='cp'; else if(d.status==='absent')c='ca'; else if(d.status==='leave')c='cl';

        <span style="background:#f0f0f0;padding:2px 7px;border-radius:4px">Weekend</span>
      </div>

  <table>
    <thead><tr><th>Worker</th><th>Project</th><th>Monthly Salary</th><th>Present</th><th>Leave</th><th>Absent</th><th>After Absence</th><th>Adv. Deduction</th><th>Net Payable</th></tr></thead>
    <tbody>
      ${reports.map(r=>`<tr>
        <td>${r.w.name}</td><td style="font-size:12px">${r.proj?.name||'—'}</td>
        <td>₹${Number(r.w.wage).toLocaleString('en-IN')}</td><td>${r.present}</td><td>${r.leaveDays}</td><td>${r.absent}</td>

      </tr>`).join('')}
      <tr class="tr"><td colspan="6">TOTAL</td><td>₹${totalGross.toLocaleString('en-IN')}</td><td style="color:#c0392b">${totalDed>0?'−₹'+totalDed.toLocaleString('en-IN'):'—'}</td><td style="color:#2d7a2d">₹${totalNet.toLocaleString('en-IN')}</td></tr>

  </table>
  <div class="footer"><span>WorkTrack — Confidential Payroll Document</span><span>Authorised by ${S.user.name} · ${now}</span></div>
  </body></html>`;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Salary_Statement_${mon}_${yr}.html`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showAlert('Report downloaded! Open in browser → Ctrl+P to save as PDF.');
}

async function renderMgrWorkers() {
  const [workers, badges] = await Promise.all([GET('/api/workers'), getBadges()]);
  const workerData = await Promise.all(workers.map(async w => {
    const [att, proj] = await Promise.all([
      GET(`/api/attendance?worker_id=${w.id}`),
      GET(`/api/worker-project/${w.id}`).catch(()=>null),
    ]);
    const present = att.filter(a=>a.status==='present').length;
    const absent  = att.filter(a=>a.status==='absent').length;
    return { ...w, present, absent, proj };
  }));

  render(mgrLayout(`
    <div class="page-hd"><div><div class="page-title">Worker Roster</div><div class="page-sub">All registered daily wage workers</div></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1rem">
      ${workerData.map(w=>`
        <div class="card" style="margin-bottom:0">
          <div class="flex-c" style="margin-bottom:12px">
            <div class="avatar" style="width:44px;height:44px;font-size:16px">${initials(w.name)}</div>
            <div><div style="font-weight:700">${w.name}</div></div>
          </div>
          <div class="info-row"><i class="ti ti-map-pin"></i>${w.proj?.name||'No project assigned'}</div>
          <div class="info-row"><i class="ti ti-phone"></i>${w.phone}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
            <div class="stat" style="padding:10px"><div class="stat-label">Present</div><div class="stat-val c-teal" style="font-size:20px">${w.present}</div></div>
            <div class="stat" style="padding:10px"><div class="stat-label">Absent</div><div class="stat-val c-red" style="font-size:20px">${w.absent}</div></div>
          </div>
        </div>`).join('')}

  `, badges));
  attachNav();
}

// ── MGR PROJECT MANAGEMENT ────────────────────────────────────────────────────
async function renderMgrProjects() {
  const [projects, badges] = await Promise.all([GET('/api/projects'), getBadges()]);

  const typeOpts = ['construction','road','renovation','maintenance']
    .map(t=>`<option value="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('');
  const statusOpts = ['active','on-hold','completed']
    .map(s=>`<option value="${s}">${s}</option>`).join('');

  function deadlineBadge(end_date) {
    const diff = Math.ceil((new Date(end_date+' 00:00:00') - new Date()) / 86400000);
    if (diff < 0)  return `<span class="badge" style="background:var(--red-l);color:var(--red-d)"><i class="ti ti-alert-circle"></i> Overdue ${Math.abs(diff)}d</span>`;
    if (diff <= 14) return `<span class="badge" style="background:var(--amber-l);color:var(--amber-d)"><i class="ti ti-clock"></i> ${diff}d left</span>`;
    return `<span class="badge" style="background:var(--green-l);color:var(--green-d)"><i class="ti ti-calendar"></i> ${diff}d left</span>`;
  }

  render(mgrLayout(`
    <div class="page-hd">
      <div><div class="page-title">Projects</div><div class="page-sub">Add, edit, and manage all site projects</div></div>
    </div>

    <div class="card">
      <div class="card-title">Add New Project</div>
      <div class="form-grid">
        <div class="form-field"><label>Project Name</label><input type="text" id="pj-name" placeholder="e.g. Green Park Phase 2"></div>
        <div class="form-field"><label>Location</label><input type="text" id="pj-loc" placeholder="e.g. Sector 45, Noida"></div>
      </div>
      <div class="form-grid col3">
        <div class="form-field"><label>Type</label><select id="pj-type">${typeOpts}</select></div>
        <div class="form-field"><label>Manager Name</label><input type="text" id="pj-mgr" placeholder="Site manager name"></div>
        <div class="form-field"><label>Status</label><select id="pj-status">${statusOpts}</select></div>
      </div>
      <div class="form-grid">
        <div class="form-field"><label>Start Date</label><input type="date" id="pj-start"></div>
        <div class="form-field"><label>Deadline / End Date</label><input type="date" id="pj-end"></div>
      </div>
      <div class="form-field"><label>Description</label><textarea id="pj-desc" placeholder="Brief scope of work…"></textarea></div>
      <button class="btn btn-amber" id="pj-add-btn"><i class="ti ti-plus"></i> Add Project</button>
    </div>

    <!-- Edit modal -->
    <div id="pj-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;padding:1rem">
      <div style="background:var(--card);border-radius:16px;padding:1.75rem;width:100%;max-width:540px;box-shadow:0 8px 32px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto">
        <div style="font-size:17px;font-weight:700;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center">
          Edit Project <button id="pj-close" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2)">×</button>
        </div>
        <div class="form-grid">
          <div class="form-field"><label>Project Name</label><input type="text" id="epj-name"></div>
          <div class="form-field"><label>Location</label><input type="text" id="epj-loc"></div>
        </div>
        <div class="form-grid col3">
          <div class="form-field"><label>Type</label><select id="epj-type">${typeOpts}</select></div>
          <div class="form-field"><label>Manager Name</label><input type="text" id="epj-mgr"></div>
          <div class="form-field"><label>Status</label><select id="epj-status">${statusOpts}</select></div>
        </div>
        <div class="form-grid">
          <div class="form-field"><label>Start Date</label><input type="date" id="epj-start"></div>
          <div class="form-field"><label>Deadline / End Date</label><input type="date" id="epj-end"></div>
        </div>
        <div class="form-field"><label>Description</label><textarea id="epj-desc"></textarea></div>
        <input type="hidden" id="epj-id">
        <div style="display:flex;gap:10px;margin-top:4px">
          <button class="btn btn-amber" id="epj-save" style="flex:1"><i class="ti ti-check"></i> Save Changes</button>
          <button class="btn btn-ghost" id="epj-cancel" style="flex:1">Cancel</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">All Projects (${projects.length})</div>
      ${projects.length === 0
        ? `<div class="empty-state"><i class="ti ti-building-factory-2"></i><p>No projects yet</p></div>`
        : `<div class="table-wrap"><table>
            <thead><tr><th>Name</th><th>Location</th><th>Type</th><th>Manager</th><th>Status</th><th>Deadline</th><th>Actions</th></tr></thead>
            <tbody>${projects.map(p=>`<tr>
              <td style="font-weight:600;max-width:160px">${p.name}</td>
              <td style="font-size:12.5px;max-width:140px">${p.location}</td>
              <td><span class="badge badge-${p.type}">${p.type}</span></td>
              <td style="font-size:12.5px">${p.manager_name}</td>
              <td><span class="badge badge-${p.status==='on-hold'?'on-hold':p.status==='completed'?'approved':'active'}">${p.status}</span></td>
              <td>${deadlineBadge(p.end_date)}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-ghost btn-sm" data-edit-proj='${JSON.stringify(p).replace(/'/g,"&#39;")}'>
                  <i class="ti ti-pencil"></i> Edit
                </button>
                <button class="btn btn-red btn-sm" data-del-proj="${p.id}" data-del-pname="${p.name}" style="margin-left:6px">
                  <i class="ti ti-trash"></i>
                </button>
              </td>
            </tr>`).join('')}
            </tbody></table></div>`}
    </div>
  `, badges));
  attachNav();

  // Add project
  document.getElementById('pj-add-btn').onclick = async () => {
    const name  = document.getElementById('pj-name').value.trim();
    const loc   = document.getElementById('pj-loc').value.trim();
    const type  = document.getElementById('pj-type').value;
    const mgr   = document.getElementById('pj-mgr').value.trim();
    const start = document.getElementById('pj-start').value;
    const end   = document.getElementById('pj-end').value;
    const status = document.getElementById('pj-status').value;
    const desc  = document.getElementById('pj-desc').value.trim();
    if (!name||!loc||!mgr||!start||!end) { showAlert('Please fill all required fields.','warning'); return; }
    if (new Date(end) < new Date(start)) { showAlert('Deadline must be after start date.','warning'); return; }
    try {
      await POST('/api/projects', { name, location:loc, type, manager_name:mgr, start_date:start, end_date:end, status, description:desc });
      showAlert(`Project "${name}" added!`);
      showPage('mgr-projects');
    } catch(e) { showAlert(e.message,'error'); }
  };

  // Delete project
  document.querySelectorAll('[data-del-proj]').forEach(b => {
    b.onclick = async () => {
      if (!confirm(`Delete project "${b.dataset.delPname}"? Workers assigned to it will be unassigned.`)) return;
      try {
        await api('DELETE', `/api/projects/${b.dataset.delProj}`);
        showAlert('Project deleted.','warning');
        showPage('mgr-projects');
      } catch(e) { showAlert(e.message,'error'); }
    };
  });

  // Edit modal
  const modal = document.getElementById('pj-modal');
  document.querySelectorAll('[data-edit-proj]').forEach(btn => {
    btn.onclick = () => {
      const p = JSON.parse(btn.dataset.editProj);
      document.getElementById('epj-id').value    = p.id;
      document.getElementById('epj-name').value  = p.name;
      document.getElementById('epj-loc').value   = p.location;
      document.getElementById('epj-type').value  = p.type;
      document.getElementById('epj-mgr').value   = p.manager_name;
      document.getElementById('epj-status').value= p.status;
      document.getElementById('epj-start').value = p.start_date;
      document.getElementById('epj-end').value   = p.end_date;
      document.getElementById('epj-desc').value  = p.description || '';
      modal.style.display = 'flex';
    };
  });
  document.getElementById('pj-close').onclick  = () => { modal.style.display='none'; };
  document.getElementById('epj-cancel').onclick = () => { modal.style.display='none'; };
  modal.onclick = e => { if(e.target===modal) modal.style.display='none'; };
  document.getElementById('epj-save').onclick = async () => {
    const id    = document.getElementById('epj-id').value;
    const name  = document.getElementById('epj-name').value.trim();
    const loc   = document.getElementById('epj-loc').value.trim();
    const type  = document.getElementById('epj-type').value;
    const mgr   = document.getElementById('epj-mgr').value.trim();
    const status= document.getElementById('epj-status').value;
    const start = document.getElementById('epj-start').value;
    const end   = document.getElementById('epj-end').value;
    const desc  = document.getElementById('epj-desc').value.trim();
    if (!name||!loc||!mgr||!start||!end) { showAlert('Please fill all fields.','warning'); return; }
    if (new Date(end) < new Date(start)) { showAlert('Deadline must be after start date.','warning'); return; }
    try {
      await PATCH(`/api/projects/${id}`, { name, location:loc, type, manager_name:mgr, start_date:start, end_date:end, status, description:desc });
      modal.style.display='none';
      showAlert('Project updated!');
      showPage('mgr-projects');
    } catch(e) { showAlert(e.message,'error'); }
  };
}

      <div class="form-field"><label>Confirm New PIN</label><input type="password" id="prof-confirm-pin" maxlength="6" placeholder="Repeat new PIN"></div>
      <button class="btn btn-blue" id="prof-pin-save"><i class="ti ti-key"></i> Change PIN</button>
    </div>
  `));
  attachNav();

    const phone = document.getElementById('prof-phone').value.trim();
    if (!phone) { showAlert('Please enter a phone number.','warning'); return; }
    try {
      await PATCH(`/api/users/${u.id}/profile`, { phone });
      S.user.phone = phone;
      showAlert('Phone number updated!');
    } catch(e) { showAlert(e.message,'error'); }
  };

  document.getElementById('prof-pin-save').onclick = async () => {
    const cur     = document.getElementById('prof-cur-pin').value.trim();
    const newPin  = document.getElementById('prof-new-pin').value.trim();
    const confirm = document.getElementById('prof-confirm-pin').value.trim();

    if (newPin.length < 4)  { showAlert('New PIN must be at least 4 digits.','warning'); return; }

      await PATCH(`/api/users/${u.id}/profile`, { phone: u.phone, current_pin: cur, new_pin: newPin });

      document.getElementById('prof-cur-pin').value = '';
      document.getElementById('prof-new-pin').value = '';
      document.getElementById('prof-confirm-pin').value = '';
    } catch(e) { showAlert(e.message,'error'); }
  };
}

    <div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center">
      <div style="background:var(--card);border-radius:16px;padding:1.75rem;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.18);margin:1rem">
        <div style="font-size:17px;font-weight:700;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center">
          Edit User <button id="edit-close" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2)">×</button>
        </div>
        <div class="form-field"><label>Full Name</label><input type="text" id="edit-name"></div>
        <div class="form-field"><label>New PIN (leave blank to keep current)</label><input type="password" id="edit-pin" maxlength="6" placeholder="Leave blank to keep"></div>
        <div class="form-field" id="edit-wage-field"><label>Monthly Salary (₹)</label><input type="number" id="edit-wage" min="0"></div>
        <div class="form-field"><label>Phone</label><input type="tel" id="edit-phone"></div>
        <input type="hidden" id="edit-uid">
        <div style="display:flex;gap:10px;margin-top:1rem">
          <button class="btn btn-amber" id="edit-save-btn" style="flex:1"><i class="ti ti-check"></i> Save Changes</button>
          <button class="btn btn-ghost" id="edit-cancel" style="flex:1">Cancel</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Workers (${workers.length})</div>
      ${workers.length === 0
        ? `<div class="empty-state"><i class="ti ti-users"></i><p>No workers registered yet</p></div>`
        : `<div class="table-wrap"><table>
            <thead><tr><th>Name</th><th>Monthly Salary</th><th>Phone</th><th>Actions</th></tr></thead>
            <tbody>${workers.map(workerRowHTML).join('')}</tbody>
          </table></div>`}
    </div>

    <div class="card">
      <div class="card-title">Managers (${managers.length})</div>
      ${managers.length === 0
        ? `<div class="empty-state"><i class="ti ti-briefcase"></i><p>No managers registered yet</p></div>`
        : `<div class="table-wrap"><table>
            <thead><tr><th>Name</th><th>Phone</th><th>Actions</th></tr></thead>
            <tbody>${managers.map(managerRowHTML).join('')}</tbody>
          </table></div>`}
    </div>
  `, badges));
  attachNav();

  // ── Add worker ──
  document.getElementById('worker-add-btn').onclick = async () => {
    const name  = document.getElementById('worker-name').value.trim();
    const pin   = document.getElementById('worker-pin').value.trim();
    const wage  = document.getElementById('worker-wage').value;
    const phone = document.getElementById('worker-phone').value.trim();
    if (!name || !pin) { showAlert('Name and PIN are required.', 'warning'); return; }
    if (pin.length < 4) { showAlert('PIN must be at least 4 digits.', 'warning'); return; }
    try {
      await POST('/api/users', { name, pin, role: 'worker', wage: Number(wage) || 0, phone });
      showAlert(`Worker "${name}" added successfully!`);
      showPage('mgr-user-mgmt');
    } catch(e) { showAlert(e.message, 'error'); }
  };

  // ── Add manager ──
  document.getElementById('manager-add-btn').onclick = async () => {
    const name  = document.getElementById('manager-name').value.trim();
    const pin   = document.getElementById('manager-pin').value.trim();
    const phone = document.getElementById('manager-phone').value.trim();
    if (!name || !pin) { showAlert('Name and PIN are required.', 'warning'); return; }
    if (pin.length < 4) { showAlert('PIN must be at least 4 digits.', 'warning'); return; }
    try {
      await POST('/api/users', { name, pin, role: 'manager', wage: 0, phone });
      showAlert(`Manager "${name}" added successfully!`);
      showPage('mgr-user-mgmt');
    } catch(e) { showAlert(e.message, 'error'); }
  };

  // ── Delete ──
  document.querySelectorAll('[data-del-user]').forEach(btn => {
    btn.onclick = async () => {
      const name = btn.dataset.delName;
      if (!confirm(`Remove "${name}" permanently? Their attendance history will be kept, but they won't be able to log in.`)) return;
      try {
        await api('DELETE', `/api/users/${btn.dataset.delUser}`);
        showAlert(`"${name}" removed.`, 'warning');
        showPage('mgr-user-mgmt');
      } catch(e) { showAlert(e.message, 'error'); }
    };
  });

  // ── Edit modal ──
  const modal = document.getElementById('edit-modal');
  document.querySelectorAll('[data-edit-user]').forEach(btn => {
    btn.onclick = () => {
      document.getElementById('edit-uid').value   = btn.dataset.editUser;
      document.getElementById('edit-name').value  = btn.dataset.editName;
      document.getElementById('edit-pin').value   = '';
      document.getElementById('edit-wage').value  = btn.dataset.editWage;
      document.getElementById('edit-phone').value = btn.dataset.editPhone;
      // hide wage field for managers (wage=0 is irrelevant)
      const isWorker = btn.dataset.editWage !== '0' || workers.find(w=>w.id===btn.dataset.editUser);
      document.getElementById('edit-wage-field').style.display = isWorker ? 'block' : 'none';
      modal.style.display = 'flex';
    };
  });
  document.getElementById('edit-close').onclick   = () => { modal.style.display = 'none'; };
  document.getElementById('edit-cancel').onclick  = () => { modal.style.display = 'none'; };
  document.getElementById('edit-save-btn').onclick = async () => {
    const uid   = document.getElementById('edit-uid').value;
    const name  = document.getElementById('edit-name').value.trim();
    const pin   = document.getElementById('edit-pin').value.trim();
    const wage  = document.getElementById('edit-wage').value;
    const phone = document.getElementById('edit-phone').value.trim();
    if (!name) { showAlert('Name cannot be empty.', 'warning'); return; }
    const payload = { name, phone, wage: Number(wage) || 0 };
    if (pin) { if (pin.length < 4) { showAlert('PIN must be at least 4 digits.', 'warning'); return; } payload.pin = pin; }
    try {
      await PATCH(`/api/users/${uid}`, payload);
      modal.style.display = 'none';
      showAlert('User updated successfully!');
      showPage('mgr-user-mgmt');
    } catch(e) { showAlert(e.message, 'error'); }
  };
  modal.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };
}

// ── WORKER BILLS ──────────────────────────────────────────────────────────────
async function renderWorkerBills() {
  const [bills, projects] = await Promise.all([
    GET(`/api/bills?worker_id=${S.user.id}`),
    GET('/api/projects'),
  ]);
  const activeProjects = projects.filter(p => p.status === 'active');

  const BILL_CATS = ['Materials','Transport','Food & Accommodation','Tools & Equipment','Site Safety','Other'];

  render(workerLayout(`
    <div class="page-hd"><div><div class="page-title">Submit Bill / Expense</div>
    <div class="page-sub">Upload bills for company-reimbursable expenses</div></div></div>

    <div class="card">
      <div class="card-title">New Bill Submission</div>
      <div class="form-grid">
        <div class="form-field">
          <label>Project</label>
          <select id="bill-proj">
            <option value="">— Select project —</option>
            ${activeProjects.map(p=>`<option value="${p.id}">${p.name} — ${p.location}</option>`).join('')}
          </select>
        </div>
        <div class="form-field">
          <label>Category</label>
          <select id="bill-cat">
            ${BILL_CATS.map(c=>`<option>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label>Amount (₹)</label>
          <input type="number" id="bill-amount" placeholder="e.g. 850" min="1">
        </div>
        <div class="form-field">
          <label>Description</label>
          <input type="text" id="bill-desc" placeholder="What is this expense for?">
        </div>
      </div>

      <div class="form-field">
        <label>Bill / Receipt Image <span style="color:var(--text3);font-weight:400;font-size:11px">(photo of bill or invoice)</span></label>
        <div id="bill-img-zone" style="border:2px dashed var(--border);border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;background:var(--bg);transition:border-color .15s" onclick="document.getElementById('bill-img-input').click()">
          <i class="ti ti-file-upload" style="font-size:28px;color:var(--text3)"></i>
          <div style="font-size:13px;color:var(--text2);margin-top:6px">Tap to upload bill photo</div>
          <div style="font-size:11.5px;color:var(--text3)">JPG, PNG — max 5MB</div>
          <img id="bill-img-preview" style="display:none;max-width:100%;max-height:200px;border-radius:8px;margin-top:10px;object-fit:contain">
        </div>
        <input type="file" id="bill-img-input" accept="image/*" style="display:none">
      </div>

      <div class="form-field">
        <label>UPI/Payment Screenshot <span style="color:var(--text3);font-weight:400;font-size:11px">(optional — if already paid by you)</span></label>
        <div id="pay-img-zone" style="border:2px dashed var(--border);border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;background:var(--bg);transition:border-color .15s" onclick="document.getElementById('pay-img-input').click()">
          <i class="ti ti-qrcode" style="font-size:28px;color:var(--text3)"></i>
          <div style="font-size:13px;color:var(--text2);margin-top:6px">Tap to upload payment proof</div>
          <img id="pay-img-preview" style="display:none;max-width:100%;max-height:200px;border-radius:8px;margin-top:10px;object-fit:contain">
        </div>
        <input type="file" id="pay-img-input" accept="image/*" style="display:none">
      </div>

      <button class="btn btn-amber" id="bill-submit"><i class="ti ti-send"></i> Submit Bill</button>
    </div>

    <div class="card">
      <div class="card-title">My Submitted Bills</div>
      ${bills.length === 0
        ? `<div class="empty-state"><i class="ti ti-receipt"></i><p>No bills submitted yet</p></div>`
        : `<div class="table-wrap"><table>
            <thead><tr><th>Date</th><th>Project</th><th>Category</th><th>Amount</th><th>Description</th><th>Status</th><th>Receipt</th></tr></thead>
            <tbody>${bills.map(b=>`
              <tr>
                <td style="font-size:12.5px">${fmtDate(b.submitted_date)}</td>
                <td style="font-size:12.5px;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.project_name}</td>
                <td><span class="badge" style="background:var(--bg3);color:var(--text)">${b.category}</span></td>
                <td style="font-weight:700;color:var(--amber-d)">₹${Number(b.amount).toLocaleString('en-IN')}</td>
                <td style="max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px">${b.description}</td>
                <td><span class="badge badge-${b.status==='paid'?'approved':b.status}">${b.status}</span></td>
                <td>${b.bill_image
                  ? `<a href="${b.bill_image}" target="_blank" style="color:var(--blue);font-size:12px"><i class="ti ti-photo"></i> View</a>`
                  : '—'}</td>
              </tr>`).join('')}
            </tbody></table></div>`}
    </div>
  `));
  attachNav();

  // Image helpers
  let billImgB64 = '', payImgB64 = '';
  function setupImgInput(inputId, previewId, zoneId, onLoad) {
    document.getElementById(inputId).addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { showAlert('Image too large (max 5MB).', 'warning'); return; }
      const reader = new FileReader();
      reader.onload = ev => {
        const b64 = ev.target.result;
        document.getElementById(previewId).src = b64;
        document.getElementById(previewId).style.display = 'block';
        document.getElementById(zoneId).style.borderColor = 'var(--amber)';
        onLoad(b64);
      };
      reader.readAsDataURL(file);
    });
  }
  setupImgInput('bill-img-input', 'bill-img-preview', 'bill-img-zone', b64 => { billImgB64 = b64; });
  setupImgInput('pay-img-input',  'pay-img-preview',  'pay-img-zone',  b64 => { payImgB64  = b64; });

  document.getElementById('bill-submit').onclick = async () => {
    const project_id  = document.getElementById('bill-proj').value;
    const category    = document.getElementById('bill-cat').value;
    const amount      = document.getElementById('bill-amount').value;
    const description = document.getElementById('bill-desc').value.trim();
    if (!project_id)  { showAlert('Please select a project.', 'warning'); return; }
    if (!amount || Number(amount) < 1) { showAlert('Please enter a valid amount.', 'warning'); return; }
    if (!description) { showAlert('Please add a description.', 'warning'); return; }
    try {
      await POST('/api/bills', {
        worker_id: S.user.id, project_id, amount: Number(amount),
        category, description,
        bill_image: billImgB64,
        payment_proof: payImgB64,
      });
      showAlert('Bill submitted successfully!');
      showPage('worker-bills');
    } catch(e) { showAlert(e.message, 'error'); }
  };
}

// ── MANAGER BILLS ─────────────────────────────────────────────────────────────
async function renderMgrBills() {
  const [allBills, badges] = await Promise.all([GET('/api/bills'), getBadges()]);
  const pending   = allBills.filter(b => b.status === 'pending');
  const approved  = allBills.filter(b => b.status === 'approved');
  const paid      = allBills.filter(b => b.status === 'paid');
  const rejected  = allBills.filter(b => b.status === 'rejected');
  const totalPending = pending.reduce((s,b) => s + Number(b.amount), 0);
  const totalPaid    = paid.reduce((s,b) => s + Number(b.amount), 0);

  function billRow(b, showActions) {
    return `<tr>
      <td><div class="flex-c"><div class="avatar">${initials(b.worker_name)}</div>${b.worker_name}</div></td>
      <td style="font-size:12px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.project_name}</td>
      <td><span class="badge" style="background:var(--bg3);color:var(--text)">${b.category}</span></td>
      <td style="font-weight:700;color:var(--amber-d)">₹${Number(b.amount).toLocaleString('en-IN')}</td>
      <td style="max-width:140px;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.description}</td>
      <td style="font-size:12px">${fmtDate(b.submitted_date)}</td>
      <td>
        ${b.bill_image ? `<a href="${b.bill_image}" target="_blank" class="btn btn-ghost btn-sm"><i class="ti ti-file-invoice"></i> Bill</a>` : '—'}
        ${b.payment_proof ? `<a href="${b.payment_proof}" target="_blank" class="btn btn-ghost btn-sm" style="margin-left:4px"><i class="ti ti-qrcode"></i> UPI</a>` : ''}
      </td>
      <td><span class="badge badge-${b.status==='paid'?'approved':b.status}">${b.status}</span></td>
      ${showActions ? `<td style="white-space:nowrap">
        <button class="btn btn-teal btn-sm" data-approve-bill="${b.id}"><i class="ti ti-check"></i> Approve</button>
        <button class="btn btn-red btn-sm" style="margin-left:4px" data-reject-bill="${b.id}"><i class="ti ti-x"></i> Reject</button>
      </td>` : ''}
      ${b.status === 'approved' ? `<td style="white-space:nowrap">
        <button class="btn btn-green btn-sm" data-pay-bill="${b.id}"><i class="ti ti-cash"></i> Mark Paid</button>
      </td>` : (showActions ? '' : '<td>—</td>')}
    </tr>`;
  }

  const tableHead = (extraCol) => `<thead><tr><th>Worker</th><th>Project</th><th>Category</th><th>Amount</th><th>Description</th><th>Date</th><th>Attachments</th><th>Status</th>${extraCol?`<th>Action</th>`:''}</tr></thead>`;

  render(mgrLayout(`
    <div class="page-hd"><div><div class="page-title">Bill Expenses</div>
    <div class="page-sub">Review and reimburse worker-submitted bills</div></div></div>

    <div class="stat-grid" style="margin-bottom:1.25rem">
      <div class="stat"><div class="stat-label">Pending Review</div><div class="stat-val c-amber">${pending.length}</div><div class="stat-sub">₹${totalPending.toLocaleString('en-IN')}</div></div>
      <div class="stat"><div class="stat-label">Approved (to pay)</div><div class="stat-val c-blue">${approved.length}</div></div>
      <div class="stat"><div class="stat-label">Total Paid Out</div><div class="stat-val c-teal">₹${totalPaid.toLocaleString('en-IN')}</div></div>
      <div class="stat"><div class="stat-label">Rejected</div><div class="stat-val c-red">${rejected.length}</div></div>
    </div>

    <div class="card">
      <div class="card-title">Pending Approval (${pending.length})</div>
      ${pending.length === 0
        ? `<div class="empty-state"><i class="ti ti-receipt"></i><p>No pending bills</p></div>`
        : `<div class="table-wrap"><table>${tableHead(true)}<tbody>${pending.map(b=>billRow(b,true)).join('')}</tbody></table></div>`}
    </div>

    <div class="card">
      <div class="card-title">Approved — Awaiting Payment (${approved.length})</div>
      ${approved.length === 0
        ? `<div class="empty-state"><i class="ti ti-cash"></i><p>No approved bills pending payment</p></div>`
        : `<div class="table-wrap"><table>${tableHead(false)}<tbody>${approved.map(b=>billRow(b,false)).join('')}</tbody></table></div>`}
    </div>

    <div class="card">
      <div class="card-title">Paid Bills (${paid.length})</div>
      ${paid.length === 0
        ? `<div class="empty-state"><i class="ti ti-checks"></i><p>No bills paid yet</p></div>`
        : `<div class="table-wrap"><table>${tableHead(false)}<tbody>${paid.map(b=>billRow(b,false)).join('')}</tbody></table></div>`}
    </div>

    <!-- Pay modal: attach UPI screenshot when marking as paid -->
    <div id="pay-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center">
      <div style="background:var(--card);border-radius:16px;padding:1.75rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2);margin:1rem">
        <div style="font-size:17px;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center">
          Mark as Paid <button id="pay-close" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2)">×</button>
        </div>
        <div class="alert alert-info" style="margin-bottom:1rem"><i class="ti ti-info-circle"></i>Upload UPI receipt or payment screenshot as proof.</div>
        <div id="pay-proof-zone" style="border:2px dashed var(--border);border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;background:var(--bg)" onclick="document.getElementById('pay-proof-input').click()">
          <i class="ti ti-qrcode" style="font-size:28px;color:var(--text3)"></i>
          <div style="font-size:13px;color:var(--text2);margin-top:6px">Tap to upload payment proof</div>
          <img id="pay-proof-preview" style="display:none;max-width:100%;max-height:180px;border-radius:8px;margin-top:10px;object-fit:contain">
        </div>
        <input type="file" id="pay-proof-input" accept="image/*" style="display:none">
        <input type="hidden" id="pay-bill-id">
        <div style="display:flex;gap:10px;margin-top:1.25rem">
          <button class="btn btn-teal" id="pay-confirm" style="flex:1"><i class="ti ti-check"></i> Confirm Payment</button>
          <button class="btn btn-ghost" id="pay-cancel" style="flex:1">Cancel</button>
        </div>
      </div>
    </div>
  `, badges));
  attachNav();

  // Approve / reject
  document.querySelectorAll('[data-approve-bill]').forEach(b => b.onclick = async () => {
    await PATCH(`/api/bills/${b.dataset.approveBill}`, { status: 'approved', actioned_by: S.user.id });
    showAlert('Bill approved!'); showPage('mgr-bills');
  });
  document.querySelectorAll('[data-reject-bill]').forEach(b => b.onclick = async () => {
    await PATCH(`/api/bills/${b.dataset.rejectBill}`, { status: 'rejected', actioned_by: S.user.id });
    showAlert('Bill rejected.', 'warning'); showPage('mgr-bills');
  });

  // Pay modal
  const payModal = document.getElementById('pay-modal');
  let payProofB64 = '';
  document.querySelectorAll('[data-pay-bill]').forEach(b => {
    b.onclick = () => {
      document.getElementById('pay-bill-id').value = b.dataset.payBill;
      payProofB64 = '';
      document.getElementById('pay-proof-preview').style.display = 'none';
      payModal.style.display = 'flex';
    };
  });
  document.getElementById('pay-close').onclick  = () => { payModal.style.display = 'none'; };
  document.getElementById('pay-cancel').onclick = () => { payModal.style.display = 'none'; };
  payModal.onclick = e => { if (e.target === payModal) payModal.style.display = 'none'; };

  document.getElementById('pay-proof-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      payProofB64 = ev.target.result;
      document.getElementById('pay-proof-preview').src = payProofB64;
      document.getElementById('pay-proof-preview').style.display = 'block';
      document.getElementById('pay-proof-zone').style.borderColor = 'var(--teal)';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('pay-confirm').onclick = async () => {
    const billId = document.getElementById('pay-bill-id').value;
    try {
      await PATCH(`/api/bills/${billId}`, { status: 'paid', actioned_by: S.user.id, payment_proof: payProofB64 });
      payModal.style.display = 'none';
      showAlert('Bill marked as paid!');
      showPage('mgr-bills');
    } catch(e) { showAlert(e.message, 'error'); }
  };
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
showLogin();
</script>
</body>
